<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>父亲节快乐 · 致爸爸</title>
<meta name="description" content="一份为父亲定制的父亲节纪念网页" />
<style>
  /* ============================================================
     主题变量
     ============================================================ */
  :root{
    --navy:#0a0e1a;          /* 深蓝夜色 */
    --navy2:#0e1426;
    --warm:#1c1408;          /* 暖色阴影 */
    --gold:#e7c485;          /* 金色 */
    --gold-soft:#d8b577;
    --cream:#f4ecdb;         /* 米白 */
    --ink:#cdd2df;           /* 柔和正文 */
    --muted:#8b91a3;
    --line:rgba(231,196,133,.22);
    --serif:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong",STKaiti,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--serif);
    background:var(--navy);
    color:var(--ink);
    overflow-x:hidden;
    line-height:1.9;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ============================================================
     背景层：渐变 + 柔和光斑 + 颗粒感 + 浮光
     ============================================================ */
  .bg{position:fixed;inset:0;z-index:-3;
    background:
      radial-gradient(1200px 800px at 75% 18%, rgba(231,196,133,.10), transparent 60%),
      radial-gradient(1000px 900px at 12% 85%, rgba(56,86,150,.16), transparent 60%),
      linear-gradient(160deg, #070a14 0%, #0a0e1a 38%, #120d08 100%);
  }
  /* 跟随鼠标轻移的两团光 */
  .blob{position:fixed;z-index:-2;border-radius:50%;filter:blur(90px);opacity:.5;
    transition:transform .6s cubic-bezier(.2,.7,.2,1);will-change:transform;pointer-events:none;}
  .blob.gold{width:46vmax;height:46vmax;top:-12vmax;right:-8vmax;
    background:radial-gradient(circle,rgba(231,196,133,.34),transparent 65%);
    animation:drift1 26s ease-in-out infinite;}
  .blob.blue{width:50vmax;height:50vmax;bottom:-16vmax;left:-12vmax;
    background:radial-gradient(circle,rgba(70,104,170,.30),transparent 65%);
    animation:drift2 32s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(-3vmax,3vmax)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(3vmax,-2vmax)}}
  /* 胶片颗粒 */
  .grain{position:fixed;inset:-50%;z-index:-1;pointer-events:none;opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain 1.2s steps(4) infinite;}
  @keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(-4%,2%)}50%{transform:translate(3%,-3%)}75%{transform:translate(-2%,4%)}100%{transform:translate(2%,-2%)}}
  /* 漂浮的细微光点 */
  .specks{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;}
  .speck{position:absolute;width:3px;height:3px;border-radius:50%;
    background:rgba(231,196,133,.7);box-shadow:0 0 8px rgba(231,196,133,.6);
    animation:floatUp linear infinite;opacity:0;}
  @keyframes floatUp{0%{transform:translateY(20px);opacity:0}10%{opacity:.8}90%{opacity:.5}100%{transform:translateY(-110vh);opacity:0}}

  /* ============================================================
     通用排版与进场动画
     ============================================================ */
  .wrap{max-width:1100px;margin:0 auto;padding:0 28px;}
  section{position:relative;}
  .eyebrow{font-size:13px;letter-spacing:.4em;color:var(--gold);
    text-transform:uppercase;opacity:.85;margin-bottom:18px;}
  .reveal{opacity:0;transform:translateY(34px);
    transition:opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.7,.2,1);}
  .reveal.in{opacity:1;transform:none;}
  .delay1{transition-delay:.15s}.delay2{transition-delay:.3s}.delay3{transition-delay:.45s}.delay4{transition-delay:.6s}

  /* ============================================================
     Hero 开场
     ============================================================ */
  #hero{min-height:100svh;display:flex;align-items:center;padding:90px 0 60px;}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:64px;align-items:center;}
  .hero-title{font-size:clamp(44px,8vw,92px);line-height:1.05;color:var(--cream);
    font-weight:700;letter-spacing:.06em;
    text-shadow:0 2px 40px rgba(231,196,133,.18);}
  .hero-title .en{display:block;font-size:clamp(13px,2.4vw,18px);letter-spacing:.5em;
    color:var(--gold);font-weight:400;margin-bottom:18px;opacity:.9;}
  .hero-sub{margin-top:26px;font-size:clamp(16px,2.4vw,21px);color:var(--ink);
    max-width:30ch;opacity:.95;}
  .hero-hint{margin-top:48px;font-size:13px;letter-spacing:.25em;color:var(--muted);
    display:flex;align-items:center;gap:12px;}
  .hero-hint::before{content:"";width:46px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}
  .scrolldot{width:22px;height:34px;border:1px solid var(--line);border-radius:12px;
    position:relative;margin-top:40px;}
  .scrolldot::after{content:"";position:absolute;left:50%;top:7px;width:3px;height:7px;border-radius:2px;
    background:var(--gold);transform:translateX(-50%);animation:scroll 1.8s ease-in-out infinite;}
  @keyframes scroll{0%{opacity:0;transform:translate(-50%,0)}30%{opacity:1}80%{opacity:0;transform:translate(-50%,12px)}100%{opacity:0}}

  /* 照片：高级相框 + 柔光 + 呼吸光效 */
  .photo-frame{position:relative;aspect-ratio:4/5;border-radius:14px;overflow:hidden;
    background:linear-gradient(160deg,#15110a,#0c1019);
    box-shadow:0 40px 90px rgba(0,0,0,.6), 0 0 0 1px rgba(231,196,133,.15) inset;
    animation:breathe 7s ease-in-out infinite;}
  .photo-frame::after{content:"";position:absolute;inset:0;pointer-events:none;border-radius:14px;
    box-shadow:inset 0 0 90px rgba(0,0,0,.55), inset 0 0 0 8px rgba(244,236,219,.04);
    /* 胶片暗角 */}
  .photo-frame img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;
    filter:saturate(1.02) contrast(1.02);}
  @keyframes breathe{0%,100%{box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 0 1px rgba(231,196,133,.15) inset,0 0 50px rgba(231,196,133,.06)}
    50%{box-shadow:0 44px 100px rgba(0,0,0,.62),0 0 0 1px rgba(231,196,133,.28) inset,0 0 80px rgba(231,196,133,.16)}}
  .frame-edge{position:absolute;inset:14px;border:1px solid rgba(244,236,219,.18);border-radius:8px;pointer-events:none;z-index:2;}
  .frame-tag{position:absolute;left:18px;bottom:16px;z-index:3;font-size:12px;letter-spacing:.3em;
    color:var(--cream);opacity:.8;text-shadow:0 1px 6px rgba(0,0,0,.8);}
  /* 照片缺失时的占位 */
  .photo-frame.empty img{display:none;}
  .ph-note{display:none;position:absolute;inset:0;z-index:1;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;color:var(--muted);}
  .photo-frame.empty .ph-note{display:flex;}
  .ph-note .ico{font-size:40px;opacity:.6;}
  .ph-note code{color:var(--gold);font-family:monospace;background:rgba(231,196,133,.08);padding:2px 8px;border-radius:6px;}

  /* ============================================================
     玻璃卡片通用
     ============================================================ */
  .glass{background:linear-gradient(160deg,rgba(244,236,219,.06),rgba(244,236,219,.02));
    border:1px solid rgba(244,236,219,.10);border-radius:18px;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:0 30px 60px rgba(0,0,0,.35);}

  /* 区块间距 */
  .section-pad{padding:clamp(80px,12vh,150px) 0;}
  .sec-head{text-align:center;margin-bottom:60px;}
  .sec-head h2{font-size:clamp(26px,4.4vw,40px);color:var(--cream);letter-spacing:.08em;font-weight:700;}
  .hair{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto 0;}

  /* 信 */
  .letter{max-width:760px;margin:0 auto;padding:clamp(34px,5vw,60px);position:relative;}
  .letter .salut{font-size:clamp(20px,3vw,26px);color:var(--gold);margin-bottom:22px;}
  .letter p{font-size:clamp(16px,2.1vw,19px);color:var(--cream);opacity:.92;letter-spacing:.02em;}
  .letter .sign{margin-top:34px;text-align:right;color:var(--muted);font-size:15px;letter-spacing:.1em;}

  /* 电影感金句 */
  .quote{padding:clamp(70px,10vh,120px) 0;text-align:center;}
  .quote p{font-size:clamp(22px,4.6vw,44px);color:var(--cream);line-height:1.4;letter-spacing:.04em;
    max-width:18ch;margin:0 auto;font-weight:700;
    background:linear-gradient(180deg,#fbf3e2,#d8b577);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;}

  /* 时间线 */
  .timeline{position:relative;max-width:780px;margin:0 auto;padding-left:34px;}
  .timeline::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:1px;
    background:linear-gradient(180deg,transparent,var(--line),var(--line),transparent);}
  .tl-item{position:relative;padding:18px 0 46px;}
  .tl-item::before{content:"";position:absolute;left:-31px;top:24px;width:13px;height:13px;border-radius:50%;
    background:var(--gold);box-shadow:0 0 0 5px rgba(231,196,133,.12),0 0 18px rgba(231,196,133,.6);}
  .tl-tag{font-size:13px;letter-spacing:.3em;color:var(--gold);margin-bottom:10px;}
  .tl-text{font-size:clamp(19px,2.8vw,24px);color:var(--cream);}
  .tl-sub{margin-top:10px;color:var(--muted);font-size:clamp(14px,2vw,16px);}

  /* 关键词卡片 */
  .kw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  .kw{padding:32px 26px;border-radius:16px;position:relative;overflow:hidden;
    transition:transform .5s cubic-bezier(.2,.7,.2,1), box-shadow .5s, border-color .5s;}
  .kw::before{content:"";position:absolute;inset:0;background:radial-gradient(120px 120px at 80% 0%,rgba(231,196,133,.12),transparent 60%);opacity:0;transition:opacity .5s;}
  .kw:hover{transform:translateY(-6px);border-color:rgba(231,196,133,.4);box-shadow:0 36px 70px rgba(0,0,0,.45);}
  .kw:hover::before{opacity:1;}
  .kw .num{font-size:13px;color:var(--muted);letter-spacing:.2em;}
  .kw .word{font-size:clamp(28px,4vw,38px);color:var(--cream);margin:8px 0 12px;letter-spacing:.1em;font-weight:700;}
  .kw .word::first-letter{color:var(--gold);}
  .kw .desc{color:var(--ink);opacity:.8;font-size:15px;}

  /* 结尾 */
  #ending{text-align:center;}
  .end-title{font-size:clamp(34px,7vw,72px);color:var(--cream);font-weight:700;letter-spacing:.06em;
    background:linear-gradient(180deg,#fdf6e7,#e7c485);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 0 60px rgba(231,196,133,.1);}
  .end-text{margin:28px auto 0;max-width:30ch;font-size:clamp(16px,2.4vw,20px);color:var(--ink);opacity:.92;}
  .btn{margin-top:48px;display:inline-flex;align-items:center;gap:12px;cursor:pointer;
    font-family:var(--serif);font-size:17px;letter-spacing:.12em;color:#1a1206;font-weight:700;
    padding:16px 38px;border:none;border-radius:999px;
    background:linear-gradient(135deg,#f0d79b,#d8a85a);
    box-shadow:0 18px 40px rgba(216,168,90,.35),0 0 0 1px rgba(255,255,255,.2) inset;
    transition:transform .2s, box-shadow .3s;}
  .btn:hover{transform:translateY(-3px);box-shadow:0 26px 54px rgba(216,168,90,.5),0 0 0 1px rgba(255,255,255,.3) inset;}
  .btn:active{transform:translateY(-1px);}
  .btn .heart{font-size:18px;}

  /* 页脚 */
  footer{text-align:center;padding:70px 24px 90px;color:var(--muted);}
  footer .ftline{width:1px;height:50px;background:linear-gradient(180deg,var(--gold),transparent);margin:0 auto 28px;}
  footer .ft{font-size:15px;letter-spacing:.16em;color:var(--cream);opacity:.85;}
  footer .ft .en{display:block;margin-top:8px;font-size:13px;letter-spacing:.3em;color:var(--gold);font-style:italic;opacity:.85;}

  /* ============================================================
     祝福弹窗
     ============================================================ */
  .modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    padding:24px;opacity:0;pointer-events:none;transition:opacity .45s ease;}
  .modal.show{opacity:1;pointer-events:auto;}
  .modal-bg{position:absolute;inset:0;background:rgba(4,6,12,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  .modal-card{position:relative;max-width:460px;width:100%;text-align:center;padding:48px 36px;
    transform:translateY(24px) scale(.96);opacity:0;transition:transform .55s cubic-bezier(.2,.8,.2,1),opacity .55s;}
  .modal.show .modal-card{transform:none;opacity:1;}
  .modal-card .seal{font-size:34px;margin-bottom:18px;}
  .modal-card h3{color:var(--gold);font-size:22px;letter-spacing:.18em;margin-bottom:20px;font-weight:700;}
  .modal-card p{color:var(--cream);font-size:18px;line-height:2;opacity:.95;}
  .modal-card .close{margin-top:30px;display:inline-block;cursor:pointer;color:var(--muted);
    font-size:14px;letter-spacing:.2em;border:1px solid var(--line);border-radius:999px;padding:10px 26px;
    transition:color .3s,border-color .3s;}
  .modal-card .close:hover{color:var(--cream);border-color:rgba(231,196,133,.5);}

  /* ============================================================
     响应式
     ============================================================ */
  @media (max-width:820px){
    .hero-grid{grid-template-columns:1fr;gap:40px;}
    .hero-text{order:2;text-align:center;}
    .hero-sub{margin-left:auto;margin-right:auto;}
    .hero-hint{justify-content:center;}
    .scrolldot{margin-left:auto;margin-right:auto;}
    .photo-frame{order:1;max-width:360px;margin:0 auto;width:100%;}
    .kw-grid{grid-template-columns:1fr 1fr;gap:14px;}
    .timeline{padding-left:28px;}
  }
  @media (max-width:480px){
    .kw-grid{grid-template-columns:1fr;}
    .wrap{padding:0 20px;}
  }
  /* 尊重"减少动态"的系统设置 */
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
    .reveal{opacity:1;transform:none;}
  }
</style>
</head>
<body>
  <!-- 背景层 -->
  <div class="bg"></div>
  <div class="blob gold" id="blobGold"></div>
  <div class="blob blue" id="blobBlue"></div>
  <div class="grain"></div>
  <div class="specks" id="specks"></div>

  <!-- 开场 Hero -->
  <section id="hero">
    <div class="wrap hero-grid">
      <div class="hero-text">
        <h1 class="hero-title reveal">
          <span class="en" id="heroEn">HAPPY FATHER’S DAY</span>
          <span id="heroTitle">父亲节快乐</span>
        </h1>
        <p class="hero-sub reveal delay1" id="heroSub"></p>
        <div class="hero-hint reveal delay2" id="heroHint"></div>
        <div class="scrolldot reveal delay3"></div>
      </div>

      <div class="photo-frame reveal delay1" id="photoFrame">
        <img id="photo" alt="父亲的照片" />
        <div class="frame-edge"></div>
        <div class="frame-tag" id="frameTag"></div>
        <div class="ph-note">
          <div class="ico">🖼️</div>
          <div>把父亲的照片命名为 <code>father.jpg</code><br/>放进 <code>public</code> 文件夹即可</div>
        </div>
      </div>
    </div>
  </section>

  <!-- 致父亲的一封信 -->
  <section class="section-pad">
    <div class="wrap">
      <div class="sec-head reveal">
        <div class="eyebrow">A LETTER</div>
        <h2 id="letterTitle"></h2>
        <div class="hair"></div>
      </div>
      <div class="letter glass reveal delay1">
        <div class="salut" id="letterSalut"></div>
        <p id="letterBody"></p>
        <div class="sign" id="letterSign"></div>
      </div>
    </div>
  </section>

  <!-- 电影感金句 -->
  <section class="quote">
    <div class="wrap">
      <p class="reveal" id="quote1"></p>
    </div>
  </section>

  <!-- 父爱时间线 -->
  <section class="section-pad">
    <div class="wrap">
      <div class="sec-head reveal">
        <div class="eyebrow">TIMELINE</div>
        <h2 id="timelineTitle"></h2>
        <div class="hair"></div>
      </div>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>

  <!-- 父亲的关键词 -->
  <section class="section-pad">
    <div class="wrap">
      <div class="sec-head reveal">
        <div class="eyebrow">WHO HE IS</div>
        <h2 id="keywordsTitle"></h2>
        <div class="hair"></div>
      </div>
      <div class="kw-grid" id="keywords"></div>
    </div>
  </section>

  <!-- 祝福结尾 -->
  <section class="section-pad" id="ending">
    <div class="wrap">
      <h2 class="end-title reveal" id="endTitle"></h2>
      <p class="end-text reveal delay1" id="endText"></p>
      <button class="btn reveal delay2" id="blessBtn">
        <span class="heart">❤</span><span id="btnText"></span>
      </button>
    </div>
  </section>

  <!-- 页脚 -->
  <footer>
    <div class="ftline reveal"></div>
    <div class="ft reveal delay1" id="footer"></div>
  </footer>

  <!-- 祝福弹窗 -->
  <div class="modal" id="modal">
    <div class="modal-bg" id="modalBg"></div>
    <div class="modal-card glass">
      <div class="seal">🌿</div>
      <h3 id="modalTitle">父亲节快乐</h3>
      <p id="modalText"></p>
      <span class="close" id="modalClose">轻轻收下这份心意</span>
    </div>
  </div>

<script>
/* ============================================================
   ★★★ 配置区：所有可替换内容都在这里，改这里就行 ★★★
   ============================================================ */
const CONFIG = {
  // —— 照片：把照片放到 public/father.jpg；要换路径改这里 ——
  photo: "public/father.jpg",
  frameTag: "FATHER",                 // 相框左下角的小字（可留空）

  // —— 称呼 ——
  fatherCall: "爸爸",

  // —— 开场 Hero ——
  heroEn: "HAPPY FATHER’S DAY",
  heroTitle: "父亲节快乐",
  heroSub: "谢谢你，把岁月站成了我们的靠山。",
  heroHint: "向下滚动，有些话想认真对你说",

  // —— 致父亲的一封信 ——
  letterTitle: "致父亲的一封信",
  letterSalut: "亲爱的爸爸：",
  letterBody:
    "也许我很少把感谢说出口，但我一直知道，你用沉默撑起了这个家。" +
    "你不善表达，却把爱藏在每一次奔波、每一句叮嘱、每一个转身的背影里。" +
    "今天是父亲节，想认真对你说一声：谢谢你，辛苦了。" +
    "愿你往后的日子，身体安康，心中有光，被岁月温柔以待。",
  letterSign: "—— 永远爱你的孩子",

  // —— 电影感金句（大字） ——
  quote1: "你不常说爱，却把爱做成了生活。",

  // —— 父爱时间线 ——
  timelineTitle: "父爱时间线",
  timeline: [
    { tag: "小时候", text: "小时候，你是我的安全感。", sub: "你把风雨挡在身后，把安稳留给我们。" },
    { tag: "长大后", text: "长大后，才懂你的不容易。", sub: "小时候觉得你无所不能，长大后才知道你也一直在硬撑。" },
    { tag: "现在",   text: "现在，我想成为让你安心的人。", sub: "换我来，做你可以靠一靠的人。" },
  ],

  // —— 父亲的关键词卡片 ——
  keywordsTitle: "父亲的关键词",
  keywords: [
    { word: "责任", desc: "扛得起，从不喊累。" },
    { word: "沉默", desc: "话不多，却句句有分量。" },
    { word: "担当", desc: "家里的难，他总是先接住。" },
    { word: "守护", desc: "把我们护在身后的那个人。" },
    { word: "牵挂", desc: "嘴上说别担心，心里记着每件小事。" },
    { word: "靠山", desc: "无论长多大，回头他都在。" },
  ],

  // —— 祝福结尾 ——
  endTitle: "爸爸，父亲节快乐。",
  endText: "愿时光慢一点，愿你笑容多一点，愿我有能力让你轻松一点。",
  btnText: "把这份祝福送给爸爸",

  // —— 点击按钮后的弹窗祝福 ——
  blessing: "爸爸，谢谢你一直在。父亲节快乐，愿你平安健康，永远开心。",

  // —— 页脚 ——
  footer: "献给我最敬爱的父亲",
  footerEn: "Happy Father’s Day",
};
/* ============================================================
   配置区结束（下面一般不用改）
   ============================================================ */

(function(){
  "use strict";
  const $ = (id) => document.getElementById(id);
  const setText = (id, val) => { const el = $(id); if (el) el.textContent = val; };

  /* ---------- 填充文案 ---------- */
  setText("heroEn", CONFIG.heroEn);
  setText("heroTitle", CONFIG.heroTitle);
  setText("heroSub", CONFIG.heroSub);
  setText("heroHint", CONFIG.heroHint);
  setText("frameTag", CONFIG.frameTag);

  setText("letterTitle", CONFIG.letterTitle);
  setText("letterSalut", CONFIG.letterSalut || (CONFIG.fatherCall + "："));
  setText("letterBody", CONFIG.letterBody);
  setText("letterSign", CONFIG.letterSign);

  setText("quote1", CONFIG.quote1);

  setText("timelineTitle", CONFIG.timelineTitle);
  setText("keywordsTitle", CONFIG.keywordsTitle);

  setText("endTitle", CONFIG.endTitle);
  setText("endText", CONFIG.endText);
  setText("btnText", CONFIG.btnText);
  setText("modalText", CONFIG.blessing);

  const footEl = $("footer");
  if (footEl) footEl.innerHTML = CONFIG.footer + '<span class="en">· ' + CONFIG.footerEn + ' ·</span>';

  /* ---------- 照片 ---------- */
  const photo = $("photo");
  const frame = $("photoFrame");
  photo.onerror = () => frame.classList.add("empty");   // 照片没放时显示提示
  photo.src = CONFIG.photo;

  /* ---------- 时间线 ---------- */
  const tl = $("timeline");
  CONFIG.timeline.forEach((it, i) => {
    const d = document.createElement("div");
    d.className = "tl-item reveal";
    d.style.transitionDelay = (i * 0.12) + "s";
    d.innerHTML =
      '<div class="tl-tag">' + it.tag + '</div>' +
      '<div class="tl-text">' + it.text + '</div>' +
      '<div class="tl-sub">' + it.sub + '</div>';
    tl.appendChild(d);
  });

  /* ---------- 关键词卡片 ---------- */
  const kw = $("keywords");
  CONFIG.keywords.forEach((it, i) => {
    const c = document.createElement("div");
    c.className = "kw glass reveal";
    c.style.transitionDelay = (i % 3) * 0.1 + "s";
    const num = String(i + 1).padStart(2, "0");
    c.innerHTML =
      '<div class="num">' + num + '</div>' +
      '<div class="word">' + it.word + '</div>' +
      '<div class="desc">' + it.desc + '</div>';
    kw.appendChild(c);
  });

  /* ---------- 滚动淡入 ---------- */
  const io = new IntersectionObserver((entries) => {
    entries.forEach((e) => { if (e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } });
  }, { threshold: 0.16 });
  document.querySelectorAll(".reveal").forEach((el) => io.observe(el));
  // 首屏元素稍后触发，制造"缓缓浮现"的仪式感
  setTimeout(() => {
    document.querySelectorAll("#hero .reveal").forEach((el) => el.classList.add("in"));
  }, 220);

  /* ---------- 鼠标移动：背景光影轻微跟随 ---------- */
  const bg = $("blobGold"), bb = $("blobBlue");
  let tx = 0, ty = 0, cx = 0, cy = 0, raf = null;
  function loop(){
    cx += (tx - cx) * 0.06; cy += (ty - cy) * 0.06;
    bg.style.transform = "translate(" + (cx * 30) + "px," + (cy * 30) + "px)";
    bb.style.transform = "translate(" + (-cx * 26) + "px," + (-cy * 26) + "px)";
    raf = Math.abs(tx - cx) > 0.001 || Math.abs(ty - cy) > 0.001 ? requestAnimationFrame(loop) : null;
  }
  window.addEventListener("mousemove", (e) => {
    tx = (e.clientX / window.innerWidth - 0.5) * 2;
    ty = (e.clientY / window.innerHeight - 0.5) * 2;
    if (!raf) raf = requestAnimationFrame(loop);
  }, { passive: true });

  /* ---------- 漂浮光点 ---------- */
  const specks = $("specks");
  const SPECK_N = window.innerWidth < 600 ? 10 : 18;
  for (let i = 0; i < SPECK_N; i++) {
    const s = document.createElement("div");
    s.className = "speck";
    s.style.left = Math.random() * 100 + "%";
    s.style.bottom = "-10px";
    const dur = 14 + Math.random() * 16;
    s.style.animationDuration = dur + "s";
    s.style.animationDelay = (-Math.random() * dur) + "s";
    s.style.opacity = (0.3 + Math.random() * 0.5).toFixed(2);
    const sz = (2 + Math.random() * 2).toFixed(1);
    s.style.width = sz + "px"; s.style.height = sz + "px";
    specks.appendChild(s);
  }

  /* ---------- 祝福弹窗 ---------- */
  const modal = $("modal");
  const open = () => modal.classList.add("show");
  const close = () => modal.classList.remove("show");
  $("blessBtn").addEventListener("click", open);
  $("modalClose").addEventListener("click", close);
  $("modalBg").addEventListener("click", close);
  window.addEventListener("keydown", (e) => { if (e.key === "Escape") close(); });
})();
</script>
</body>
</html>
